---
apiVersion: v1
kind: ConfigMap
metadata:
  name: todo-backend-config
data:
  DB_HOST: "mysql"          # Kubernetes service name
  DB_PORT: "3306"
  DB_NAME: "three_tier_app"
  DB_USER: "appuser"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
        - name: api
          image: noakhali/todo-backend:07b5949
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: todo-backend-config
            - secretRef:
                name: todo-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Secret
metadata:
  name: todo-backend-secret
type: Opaque
stringData:
  DB_PASS: "AppPass123!"