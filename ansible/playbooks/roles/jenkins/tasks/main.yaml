- name: Install required packages
  apt:
    name:
      - fontconfig 
      - openjdk-21-jre
    state: present
    update_cache: yes

- name: Create apt keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Jenkins GPG key
  get_url:
    url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
    dest: /etc/apt/keyrings/jenkins-keyring.asc
    mode: '0644'

- name: Add Jenkins repo
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/"
    state: present
    filename: jenkins

- name: Install Jenkins
  apt:
    name:
      - jenkins
    state: present
    update_cache: yes

- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes